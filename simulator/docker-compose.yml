services:
  box1:
    build: .
    command: box1 -laravel
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY}
    volumes:
      - ../certs:/app/certs:ro
      - ../terraform_config.py:/app/terraform_config.py:ro

  box2:
    build: .
    command: box2 -laravel
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY}
    volumes:
      - ../certs:/app/certs:ro
      - ../terraform_config.py:/app/terraform_config.py:ro
